authorizationGroupList(query:{pageSize:0}) {
  list {
    uuid
    name
    description
    status
    authorizationGroupRelatedObjects {
      relatedObjectType
      relatedObjectUuid
      relatedObject {
	... on Organization {
	  uuid
	  shortName
	}
	... on Person {
	  uuid
          familyName
          givenName
	  rank
          entityAvatar {
            attachmentUuid
            applyCrop
            cropLeft
            cropTop
            cropWidth
            cropHeight
          }
	}
	... on Position {
	  uuid
	  type
	  name
	}
      }
    }
  }
}
