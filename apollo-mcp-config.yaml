endpoint: "${ANET_GRAPHQL_ENDPOINT}"
headers:
  Authorization: "Bearer ${ANET_GRAPHQL_TOKEN}"
logging:
  level: debug
transport:
  type: streamable_http
schema:
  source: local
  path: /data/anet.graphql
operations:
  source: local
  paths:
    - /data/operations
custom_scalars: /data/apollo-mcp-custom-scalars.json
introspection:
  execute:
    enabled: true
  introspect:
    enabled: true
  search:
    enabled: true