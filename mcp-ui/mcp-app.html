<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ANET AI</title>
    <style>
      html,
      body {
        margin: 0;
        font-family: var(--font-sans, sans-serif);
        background: #f2f2f2;
        color: #0f172a;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #64748b;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #f8fafc;
        border-radius: 10px;
        padding: 12px;
        line-height: 1.5;
        border: 1px solid #e2e8f0;
      }
      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .field-list {
        display: grid;
        gap: 8px;
      }
      .field-button {
        text-align: left;
      }
      button {
        appearance: none;
        border: 1px solid #cbd5f5;
        background: #ffffff;
        color: #0f172a;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
      }
      button.primary {
        background: #1d4ed8;
        border-color: #1d4ed8;
        color: #fff;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        font-size: 12px;
        color: #64748b;
        padding-left: 6px;
      }
      .description {
        font-size: 13px;
        line-height: 1.5;
        color: #475569;
      }
      textarea {
        font-family: inherit;
        font-size: 13px;
        line-height: 1.5;
        padding: 10px 12px;
        border: 1px solid #cbd5f5;
        border-radius: 8px;
        background: #ffffff;
        color: #0f172a;
        resize: vertical;
        min-height: 80px;
      }
      textarea:focus {
        outline: 2px solid #1d4ed8;
        outline-offset: -1px;
      }
      .results-header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .filter-chips-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .filter-chip {
        font-size: 11px;
        font-weight: 500;
        padding: 3px 8px;
        border-radius: 4px;
        background: #e2e8f0;
        color: #334155;
        white-space: nowrap;
      }
      .filter-chip--text {
        background: #fef3c7;
        color: #92400e;
      }
      .filter-chip--person {
        background: #e0e7ff;
        color: #3730a3;
      }
      .filter-chip--location {
        background: #d1fae5;
        color: #065f46;
      }
      .filter-chip--org {
        background: #fce7f3;
        color: #9f1239;
      }
      .filter-chip--date {
        background: #ddd6fe;
        color: #5b21b6;
      }
      .refine-btn {
        font-size: 11px;
        padding: 3px 10px;
        color: #475569;
        border-color: #cbd5f5;
        background: #ffffff;
      }
      .refine-btn:hover {
        background: #f1f5f9;
      }
      .show-more-wrap {
        display: flex;
        justify-content: center;
        padding-top: 4px;
      }
      .show-more-btn {
        font-size: 12px;
        padding: 6px 16px;
        color: #475569;
        background: #ffffff;
        border-color: #cbd5f5;
      }
      .show-more-btn:hover:not(:disabled) {
        background: #f1f5f9;
      }
      .results-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .result-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #f8fafc;
      }
      .result-item-text {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .result-item-title {
        font-size: 13px;
        line-height: 1.4;
        color: #0f172a;
        word-break: break-word;
      }
      .result-item-meta {
        font-size: 11px;
        line-height: 1.3;
        color: #64748b;
        word-break: break-word;
      }
      .match-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px;
      }
      .match-badge {
        font-size: 10px;
        font-weight: 500;
        padding: 2px 6px;
        border-radius: 4px;
        background: #e2e8f0;
        color: #334155;
        white-space: nowrap;
      }
      .match-badge--text {
        background: #fef3c7;
        color: #92400e;
      }
      .match-badge--author,
      .match-badge--attendee {
        background: #e0e7ff;
        color: #3730a3;
      }
      .match-badge--location {
        background: #d1fae5;
        color: #065f46;
      }
      .match-badge--org {
        background: #fce7f3;
        color: #9f1239;
      }
      .match-badge--date {
        background: #ddd6fe;
        color: #5b21b6;
      }
      .result-item-open {
        font-size: 12px;
        padding: 4px 12px;
      }
      .checklist-section {
        margin-top: 4px;
      }
      .checklist-section-title {
        font-weight: 600;
        font-size: 14px;
        color: #0f172a;
        margin: 12px 0 6px;
      }
      .checklist-items {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .checklist-item {
        display: grid;
        grid-template-columns: 20px 1fr auto;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #f8fafc;
      }
      .checklist-item--pass {
        background: #f0fdf4;
        border-color: #bbf7d0;
      }
      .checklist-item--fail {
        background: #fef2f2;
        border-color: #fecaca;
      }
      .checklist-item--needs_ai {
        background: #f8fafc;
        border-color: #e2e8f0;
      }
      .checklist-icon {
        font-weight: 700;
        font-size: 15px;
        text-align: center;
      }
      .checklist-item--pass .checklist-icon {
        color: #16a34a;
      }
      .checklist-item--fail .checklist-icon {
        color: #dc2626;
      }
      .checklist-item--needs_ai .checklist-icon {
        color: #64748b;
      }
      .checklist-label {
        font-size: 13px;
        line-height: 1.4;
      }
      .checklist-help-btn {
        font-size: 12px;
        padding: 4px 10px;
      }
      .checklist-help {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .checklist-help:empty {
        display: none;
      }
      .criterion-help {
        background: #eef2ff;
        border: 1px solid #c7d2fe;
        border-radius: 10px;
        padding: 10px 12px;
      }
      .criterion-help-label {
        font-weight: 600;
        font-size: 11px;
        color: #1d4ed8;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 4px;
      }
      .criterion-help-text {
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="app-root"></div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
